<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel | THAKUR STORE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

THAKUR <span>STORE</span>

</div>

<nav>

<a href="index.html">Home</a>

<a href="products.html">Products</a>

<a href="admin.html">Admin</a>

</nav>

</header>

<section class="page-title">

<h1>Admin Panel</h1>

<p>Manage Affiliate Products</p>

</section>

<section class="admin-panel">

<form id="productForm">
<input type="hidden" id="productId">

<input
type="text"
id="title"
placeholder="Product Name"
required>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="number"
id="price"
placeholder="Current Price"
required>

<input
type="number"
id="oldPrice"
placeholder="Old Price">

<input
type="number"
step="0.1"
id="rating"
placeholder="Rating (4.8)">

<input
type="file"
id="imageFile"
accept="image/*">

<input
type="hidden"
id="image"
required>

<p id="uploadStatus"></p>
<input
type="url"
id="amazonLink"
placeholder="Amazon Affiliate Link"
required>

<input
type="url"
id="flipkartLink"
placeholder="Flipkart Affiliate Link">

<textarea
id="description"
placeholder="Product Description"></textarea>

<label>

<input type="checkbox" id="featured">

Featured Product

</label>

<button type="submit" id="saveBtn">Save Product</button>
</form>

</section>

<hr style="margin:40px 0;">

<h2>📦 Product List</h2>

<input
    type="text"
    id="searchProduct"
    placeholder="Search Product..."
    style="width:100%;padding:12px;margin:20px 0;"
>

<table id="productTable" width="100%" border="1" cellspacing="0" cellpadding="10">

    <thead>

        <tr>

            <th>Image</th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Rating</th>
            <th>Featured</th>
            <th>Action</th>

        </tr>

    </thead>

    <tbody id="productTableBody">

    </tbody>

</table>

<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>
<script type="module" src="dashboard.js"></script>

</body>

</html>
